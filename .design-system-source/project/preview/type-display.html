<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Type — Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px 20px; background: var(--surface); }
  .stack > * + * { margin-top: 8px; }
  .meta { font: var(--type-caption); color: var(--fg-3); }
  h1.x { margin: 0; font: var(--type-h1); color: var(--ink-900); line-height: 1.05; }
  .brand { font-family: var(--font-brand); color: var(--coral-600); font-size: 56px; line-height: 1; margin: 0; letter-spacing: 0.02em; }
  .display { font: var(--type-display); color: var(--ink-900); margin: 0; line-height: 1; }
</style></head>
<body>
  <div class="stack">
    <div class="meta">Brand accent — Knewave / 56px</div>
    <p class="brand">LEARN · GROW · SHINE</p>
    <div class="meta">Display — Baloo 2 800 / 48px</div>
    <h1 class="x">English little ears love.</h1>
    <div class="meta">Thai support — Noto Sans Thai Looped</div>
    <h1 class="x" style="font-family: var(--font-thai); font-weight: 700;">เรียนภาษาอังกฤษกับน้อง</h1>
  </div>
</body></html>
