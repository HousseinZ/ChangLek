<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Spacing — Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface); display: flex; gap: 14px; align-items: flex-end; }
  .box { flex: 1; aspect-ratio: 1; background: var(--coral-200); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 10px; box-shadow: var(--shadow-sm); }
  .box .l { font: var(--type-caption); font-family: var(--font-mono); color: var(--coral-900); text-align: center; }
  .box .l b { display:block; font-family: var(--font-display); font-weight: 800; font-size: 14px; color: var(--coral-700); }
</style></head>
<body>
  <div class="box" style="border-radius: var(--r-sm)"><div class="l"><b>sm</b>8px</div></div>
  <div class="box" style="border-radius: var(--r-md)"><div class="l"><b>md</b>14px</div></div>
  <div class="box" style="border-radius: var(--r-lg)"><div class="l"><b>lg</b>20px</div></div>
  <div class="box" style="border-radius: var(--r-xl)"><div class="l"><b>xl</b>28px</div></div>
  <div class="box" style="border-radius: var(--r-2xl)"><div class="l"><b>2xl</b>36px</div></div>
  <div class="box" style="border-radius: var(--r-pill)"><div class="l"><b>pill</b>full</div></div>
</body></html>
