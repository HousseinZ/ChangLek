<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Components — Chips & Badges</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 20px; background: var(--surface); }
  .row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
  .label { font: var(--type-caption); color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
</style></head>
<body>
  <div class="label">Status chips</div>
  <div class="row">
    <span class="cl-chip cl-chip--success">● Active</span>
    <span class="cl-chip cl-chip--coral">★ Streak 5</span>
    <span class="cl-chip cl-chip--sky">Verified</span>
    <span class="cl-chip cl-chip--amber">New</span>
    <span class="cl-chip">Default</span>
  </div>
  <div class="label">Course tags</div>
  <div class="row">
    <span class="cl-chip cl-chip--coral">Ages 3–6</span>
    <span class="cl-chip cl-chip--coral">Ages 7–9</span>
    <span class="cl-chip cl-chip--coral">Ages 10–12</span>
    <span class="cl-chip cl-chip--sky">Online</span>
    <span class="cl-chip cl-chip--sky">In-person</span>
  </div>
</body></html>
