<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Colors — Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface); }
  .row { display: flex; gap: 6px; }
  .sw { flex: 1; aspect-ratio: 1; border-radius: var(--r-sm); display: flex; flex-direction: column; justify-content: flex-end; padding: 6px; box-shadow: var(--shadow-sm); }
  .sw .name { font: var(--type-caption); font-weight: 700; }
  .sw.l .name, .sw.l .hex { color: var(--ink-800); }
  .sw.l .hex { font: var(--type-caption); color: var(--ink-500); }
  .sw.d .name, .sw.d .hex { color: #fff; }
  .sw.d .hex { font: var(--type-caption); color: rgba(255,255,255,0.8); }
  h4 { font: var(--type-label); color: var(--fg-3); margin: 0 0 10px; text-transform: uppercase; letter-spacing: 0.06em; }
  .note { font: var(--type-caption); color: var(--fg-3); margin-top: 10px; }
</style></head>
<body>
  <h4>Ink · Warm-tinted neutrals</h4>
  <div class="row">
    <div class="sw l" style="background:var(--ink-50); outline:1px solid var(--ink-100); outline-offset:-1px"><div class="name">50</div></div>
    <div class="sw l" style="background:var(--ink-100)"><div class="name">100</div></div>
    <div class="sw l" style="background:var(--ink-200)"><div class="name">200</div></div>
    <div class="sw l" style="background:var(--ink-300)"><div class="name">300</div></div>
    <div class="sw d" style="background:var(--ink-400)"><div class="name">400</div></div>
    <div class="sw d" style="background:var(--ink-500)"><div class="name">500</div></div>
    <div class="sw d" style="background:var(--ink-600)"><div class="name">600</div></div>
    <div class="sw d" style="background:var(--ink-700)"><div class="name">700</div></div>
    <div class="sw d" style="background:var(--ink-800)"><div class="name">800</div></div>
    <div class="sw d" style="background:var(--ink-900)"><div class="name">900</div></div>
  </div>
  <div class="note">Slight rose/amber bias — pure gray feels cold next to coral.</div>
</body></html>
