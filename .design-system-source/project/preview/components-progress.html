<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Components — Progress</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 20px; background: var(--surface); }
  .row { display: flex; gap: 16px; align-items: center; margin-bottom: 14px; }
  .label { font: var(--type-label); color: var(--ink-700); min-width: 100px; }
  .bar { flex: 1; height: 14px; background: var(--cream-200); border-radius: var(--r-pill); overflow: hidden; box-shadow: inset 0 1px 2px rgba(0,0,0,0.05); }
  .fill { height: 100%; background: linear-gradient(90deg, var(--coral-400), var(--coral-500)); border-radius: var(--r-pill); }
  .pct { font: var(--type-label); color: var(--coral-700); width: 40px; text-align: right; }
  /* circular */
  .circ-row { display: flex; gap: 18px; align-items: center; }
  .circ { width: 64px; height: 64px; }
</style></head>
<body>
  <div class="row"><div class="label">Animal Sounds</div><div class="bar"><div class="fill" style="width:80%"></div></div><div class="pct">80%</div></div>
  <div class="row"><div class="label">Big & Small</div><div class="bar"><div class="fill" style="width:45%"></div></div><div class="pct">45%</div></div>
  <div class="row"><div class="label">Counting Fun</div><div class="bar"><div class="fill" style="width:15%; background: var(--sky-400)"></div></div><div class="pct">15%</div></div>
  <div class="circ-row">
    <svg class="circ" viewBox="0 0 64 64"><circle cx="32" cy="32" r="26" fill="none" stroke="var(--cream-200)" stroke-width="6"/><circle cx="32" cy="32" r="26" fill="none" stroke="var(--coral-500)" stroke-width="6" stroke-dasharray="163" stroke-dashoffset="33" stroke-linecap="round" transform="rotate(-90 32 32)"/><text x="32" y="38" text-anchor="middle" font-family="Baloo 2, system-ui" font-weight="800" font-size="18" fill="#38301F">80</text></svg>
    <div style="font-family: var(--font-display); font-weight: 700; color: var(--ink-800);">Daily goal — 80% there!</div>
  </div>
</body></html>
