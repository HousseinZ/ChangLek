<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Colors — Sky Accent</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface); }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; aspect-ratio: 1.4; border-radius: var(--r-md); display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; box-shadow: var(--shadow-sm); }
  .sw .name { font: var(--type-label); color: var(--ink-800); }
  .sw .hex  { font: var(--type-caption); color: var(--ink-600); }
  .sw.dark-fg .name { color: #fff; }
  .sw.dark-fg .hex { color: rgba(255,255,255,0.85); }
  h4 { font: var(--type-label); color: var(--fg-3); margin: 0 0 10px; text-transform: uppercase; letter-spacing: 0.06em; }
  .note { font: var(--type-caption); color: var(--fg-3); margin-top: 8px; }
</style></head>
<body>
  <h4>Sky · Accent (Nong's wink)</h4>
  <div class="row">
    <div class="sw" style="background:var(--sky-50)"><div class="name">50</div><div class="hex">#EAF7FD</div></div>
    <div class="sw" style="background:var(--sky-100)"><div class="name">100</div><div class="hex">#CFEDFA</div></div>
    <div class="sw" style="background:var(--sky-200)"><div class="name">200</div><div class="hex">#9DD9F2</div></div>
    <div class="sw" style="background:var(--sky-300)"><div class="name">300</div><div class="hex">#6EC6EB</div></div>
    <div class="sw dark-fg" style="background:var(--sky-400); outline:3px solid var(--sky-600); outline-offset:-3px"><div class="name">400 ·</div><div class="hex">#4FB8E5</div></div>
    <div class="sw dark-fg" style="background:var(--sky-600)"><div class="name">600</div><div class="hex">#1B7FAA</div></div>
  </div>
  <div class="note">Use for trust signals, links, info states. Cap at ~15% of any composition's color area.</div>
</body></html>
