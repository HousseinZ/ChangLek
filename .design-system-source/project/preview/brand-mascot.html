<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Brand — Mascot</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 14px; background: var(--surface); display: flex; gap: 14px; align-items: center; }
  .hero { flex: 1; background: linear-gradient(135deg, var(--cream-100), var(--coral-100)); border-radius: var(--r-lg); padding: 14px; display: flex; gap: 12px; align-items: center; box-shadow: var(--shadow-sm); }
  .hero img { width: 110px; }
  .hero .text h3 { font: var(--type-h3); color: var(--ink-900); margin: 0; }
  .hero .text p { font: var(--type-caption); color: var(--ink-600); margin: 4px 0 0; }
  .avatar-stack { display: flex; flex-direction: column; gap: 8px; }
  .avatar-stack img { width: 64px; height: 64px; border-radius: 50%; border: 3px solid #fff; box-shadow: var(--shadow-sm); }
</style></head>
<body>
  <div class="hero">
    <img src="../assets/nong-mascot.png" alt="Nong">
    <div class="text">
      <h3>Nong</h3>
      <p>Our baby elephant — guides kids through every lesson. Always winking, always cheering.</p>
    </div>
  </div>
  <div class="avatar-stack">
    <img src="../assets/nong-avatar.png" alt="">
    <img src="../assets/nong-avatar.png" alt="" style="width:48px; height:48px;">
  </div>
</body></html>
