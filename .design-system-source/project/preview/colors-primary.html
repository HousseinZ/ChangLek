<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Colors — Primary</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface); }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; aspect-ratio: 1.4; border-radius: var(--r-md); display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; box-shadow: var(--shadow-sm); position: relative; }
  .sw .name { font: var(--type-label); color: rgba(255,255,255,0.95); }
  .sw .hex  { font: var(--type-caption); color: rgba(255,255,255,0.85); margin-top: 2px; }
  .sw.dark .name, .sw.dark .hex { color: var(--ink-800); }
  .sw.dark .hex { color: var(--ink-600); }
  h4 { font: var(--type-label); color: var(--fg-3); margin: 0 0 10px; text-transform: uppercase; letter-spacing: 0.06em; }
</style>
</head>
<body>
  <h4>Coral · Brand primary</h4>
  <div class="row">
    <div class="sw dark" style="background:var(--coral-100)"><div class="name">100</div><div class="hex">#FFE3D2</div></div>
    <div class="sw dark" style="background:var(--coral-200)"><div class="name">200</div><div class="hex">#FFC6A4</div></div>
    <div class="sw" style="background:var(--coral-300)"><div class="name">300</div><div class="hex">#FFA571</div></div>
    <div class="sw" style="background:var(--coral-500); outline: 3px solid var(--coral-700); outline-offset: -3px"><div class="name">500 ·</div><div class="hex">#FF7A45</div></div>
    <div class="sw" style="background:var(--coral-700)"><div class="name">700</div><div class="hex">#C84B22</div></div>
    <div class="sw" style="background:var(--coral-900)"><div class="name">900</div><div class="hex">#6B2510</div></div>
  </div>
</body>
</html>
