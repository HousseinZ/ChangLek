<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Brand — Stickers & Pattern</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 14px; background: var(--surface); display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }
  .item { background: #fff; border-radius: var(--r-md); padding: 12px; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; align-items: center; gap: 6px; aspect-ratio: 1; }
  .item img, .item svg { max-width: 80%; max-height: 70px; }
  .lbl { font: var(--type-caption); color: var(--fg-3); text-align: center; }
  .pattern { background: var(--cream-100); background-image: url('../assets/pattern-confetti.svg'); background-size: 120px; }
</style></head>
<body>
  <div class="item"><img src="../assets/sticker-star.svg" alt=""><div class="lbl">star</div></div>
  <div class="item"><img src="../assets/sticker-confetti-burst.svg" alt=""><div class="lbl">confetti-burst</div></div>
  <div class="item"><img src="../assets/sticker-bubble-abc.svg" alt=""><div class="lbl">bubble-abc</div></div>
  <div class="item pattern"><div class="lbl" style="margin-top:auto">pattern-confetti</div></div>
</body></html>
