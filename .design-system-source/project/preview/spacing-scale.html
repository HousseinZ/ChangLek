<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Spacing — Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface); }
  .row { display: grid; grid-template-columns: 80px 1fr; align-items: center; padding: 5px 0; gap: 10px; }
  .label { font: var(--type-caption); color: var(--fg-3); font-family: var(--font-mono); }
  .bar { height: 16px; background: var(--coral-300); border-radius: 4px; }
</style></head>
<body>
  <div class="row"><div class="label">--s-1 · 4</div><div class="bar" style="width:4px"></div></div>
  <div class="row"><div class="label">--s-2 · 8</div><div class="bar" style="width:8px"></div></div>
  <div class="row"><div class="label">--s-3 · 12</div><div class="bar" style="width:12px"></div></div>
  <div class="row"><div class="label">--s-4 · 16</div><div class="bar" style="width:16px"></div></div>
  <div class="row"><div class="label">--s-5 · 20</div><div class="bar" style="width:20px"></div></div>
  <div class="row"><div class="label">--s-6 · 24</div><div class="bar" style="width:24px"></div></div>
  <div class="row"><div class="label">--s-8 · 32</div><div class="bar" style="width:32px"></div></div>
  <div class="row"><div class="label">--s-10 · 40</div><div class="bar" style="width:40px"></div></div>
  <div class="row"><div class="label">--s-14 · 56</div><div class="bar" style="width:56px"></div></div>
  <div class="row"><div class="label">--s-20 · 80</div><div class="bar" style="width:80px"></div></div>
  <div class="row"><div class="label">--s-30 · 120</div><div class="bar" style="width:120px"></div></div>
</body></html>
